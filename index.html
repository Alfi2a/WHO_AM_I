<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WHO AM I?</title>
<link rel="icon" type="image/png" href="./logo.png">

<style>

/* Minecraft font */
@font-face {
    font-family: "Minecraft";
    src: url("./minecraft.ttf") format("truetype");
}

body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: "Minecraft", monospace;
}

/* Progress bar container */
#progressContainer {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 500px;  /* max width same as flip card */
    width: 90%;        /* allows side spacing on small screens */
    background: black;
    padding: 10px 20px; /* space inside container on left/right */
    box-sizing: border-box;
    z-index: 20;
    text-align: center;
}

/* Progress text */
#progressText {
    font-family: "Minecraft", monospace;
    color: white;
    font-size: 20px;
    margin-bottom: 5px;
}

/* Progress bar background */
#progressBar {
    width: 100%;
    height: 20px;
    background: #333;
    border-radius: 0;
    overflow: hidden;
    margin: 0 auto;
}

/* Progress fill (33%) */
#progressFill {
    width: 33%; /* set progress here */
    height: 100%;
    background: red;
    border-radius: 0;
}

/* Matrix grid */
#grid {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: grid;
    color: #ff0000;
    font-size: 18px;
    user-select: none;
}

.cell {
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 0 5px #ff0000, 0 0 10px #ff0000;
}

/* Center flip card */
#centerImage {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    perspective: 1000px;
    z-index: 10;
}

.flip-card {
    width: 500px;
    height: 500px;
    cursor: pointer;
}

.flip-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.8s;
    transform-style: preserve-3d;
}

.flip-inner.flipped {
    transform: rotateY(180deg);
}

.flip-front,
.flip-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
}

.flip-front img,
.flip-back img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.flip-back {
    transform: rotateY(180deg);
}

</style>
</head>
<body>

<!-- Progress bar -->
<div id="progressContainer">
    <div id="progressText">TRAILER VIDEO PROGRESS:</div>
    <div id="progressBar">
        <div id="progressFill"></div>
    </div>
</div>

<!-- Matrix grid -->
<div id="grid"></div>

<!-- Flip card -->
<div id="centerImage">
    <div class="flip-card" onclick="flipCard()">
        <div class="flip-inner" id="flipInner">

            <div class="flip-front">
                <img src="./image2.png" alt="front">
            </div>

            <div class="flip-back">
                <img src="./image.png" alt="back">
            </div>

        </div>
    </div>
</div>

<script>
/* MATRIX GRID */
const grid = document.getElementById("grid");
const chars = "WHOAMI?whoami!";
const cellSize = 20;
const columns = Math.floor(window.innerWidth / cellSize);
const rows = Math.floor(window.innerHeight / cellSize);

grid.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

const cells = [];

for (let i = 0; i < columns * rows; i++) {
    const cell = document.createElement("div");
    cell.className = "cell";
    grid.appendChild(cell);
    cells.push(cell);
}

function randomChar() {
    return chars[Math.floor(Math.random() * chars.length)];
}

function updateGrid() {
    cells.forEach(cell => {
        if (Math.random() < 0.15) {
            cell.textContent = randomChar();
        }
    });
}

setInterval(updateGrid, 50);

/* FLIP CARD */
function flipCard() {
    document.getElementById("flipInner").classList.toggle("flipped");
}

/* FLIP CARD EASTER EGG WITH FAST AUTO COVER */
let clickCount = 0;
const clickThresholdForImage3 = 20;
const maxSmiles = 100; // more overlays for full coverage

const flipInner = document.getElementById("flipInner");

function flipCard() {
    clickCount++;

    // Flip card normally
    flipInner.classList.toggle("flipped");

    // After 20 clicks, switch to image3 and start auto-cover
    if(clickCount === clickThresholdForImage3){
        const front = flipInner.querySelector(".flip-front img");
        const back = flipInner.querySelector(".flip-back img");
        front.src = "./image3.png";
        back.src = "./image3.png";

        startAutoCover();
    }
}

// Automatically spawn smiles faster
function startAutoCover() {
    let smileCount = 0;
    const interval = setInterval(() => {
        // Spawn multiple at once for faster coverage
        for(let i=0;i<3;i++){
            const smile = document.createElement("img");
            smile.src = "./smile.png";
            smile.style.position = "fixed";
            smile.style.top = Math.random() * window.innerHeight + "px";
            smile.style.left = Math.random() * window.innerWidth + "px";
            smile.style.width = 100 + "px";
            smile.style.height = 100 + "px";
            smile.style.pointerEvents = "none";
            smile.style.zIndex = 9999;
            document.body.appendChild(smile);
            smileCount++;
        }

        if(smileCount >= maxSmiles){
            clearInterval(interval);
            setTimeout(()=>window.location.href="experiment.html", 200);
        }
    }, 50); // spawn every 50ms
}
</script>

</body>
</html>
