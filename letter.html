<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter</title>
<link rel="icon" type="image/png" href="./letter.png">

<style>

@font-face {
    font-family: "Minecraft";
    src: url("./minecraft.ttf") format("truetype");
}

body{
    background:black;
    color:white;
    font-family:"Minecraft", monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

#letterIcon{
    width:120px;
    margin-bottom:25px;
}

input{
    font-family:"Minecraft";
    background:black;
    color:white;
    border:2px solid white;
    padding:8px;
    font-size:16px;
}

button{
    font-family:"Minecraft";
    margin-left:10px;
    padding:8px 12px;
    background:black;
    color:white;
    border:2px solid white;
    cursor:pointer;
}

#letterFrame{
    display:none;
    margin-top:30px;
    max-width:600px;
    border:2px solid white;
    padding:20px;
    background:black;
}

</style>
</head>
<body>

<img src="./letter.png" id="letterIcon">

<div>
<input type="password" id="letterPassword" placeholder="Password">
<button onclick="readLetter()">Read</button>
</div>

<div id="letterFrame">
<p>
Administrator,<br><br>

If you are reading this, the system has already begun initialization.
Some memories could not be recovered. Identity reconstruction was forced.

Do not trust the player list.

They are not all contained.

— Unknown
</p>
</div>

<script>

const correctPassword = "memory";

function readLetter(){

    const input = document.getElementById("letterPassword").value;

    if(input === correctPassword){
        document.getElementById("letterFrame").style.display = "block";
    }

}

</script>

</body>
</html>
