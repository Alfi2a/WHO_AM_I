<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Experiment</title>

<style>

@font-face{
font-family:"Minecraft";
src:url("./minecraft.ttf") format("truetype");
}

body{
background:#0000ff;
color:white;
font-family:"Minecraft", monospace;
margin:0;
padding:20px;
}

/* LOGIN */

#login-screen{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

#login-screen input{
font-family:"Minecraft";
padding:10px;
margin:5px 0;
border:2px solid white;
background:#003366;
color:white;
}

#login-screen button{
font-family:"Minecraft";
padding:10px 20px;
border:2px solid white;
background:#0055aa;
color:white;
cursor:pointer;
}

#login-error{
color:yellow;
margin-top:10px;
}

/* letter icon */

#letterHint{
display:none;
height:28px;
margin-left:10px;
cursor:pointer;
vertical-align:middle;
}

/* BOOT */

#boot-screen{
display:none;
}

.module{
margin-bottom:20px;
}

.bar-container{
width:500px;
height:20px;
border:2px solid white;
background:#003366;
margin-top:5px;
}

.bar-fill{
height:100%;
background:white;
width:0%;
}

.bar-fill.yellow{
background:yellow;
}

.text-yellow{
color:yellow;
}

#player-list{
margin-top:40px;
}

.player-entry{
margin-bottom:15px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login-screen">

<h2>
Login
<img src="./letter.png" id="letterHint" onclick="openLetter()">
</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button id="login-btn">Login</button>

<div id="login-error"></div>

</div>

<!-- BOOT -->

<div id="boot-screen">

<div id="output"></div>

<div id="player-list"></div>

</div>

<script>

/* LOGIN */

const correctUsername="Administrator";
const correctPassword="Access0110";

const loginBtn=document.getElementById("login-btn");
const usernameInput=document.getElementById("username");
const passwordInput=document.getElementById("password");
const loginError=document.getElementById("login-error");

const loginScreen=document.getElementById("login-screen");
const bootScreen=document.getElementById("boot-screen");

const output=document.getElementById("output");
const playerList=document.getElementById("player-list");

function openLetter(){
window.location.href="letter.html";
}

loginBtn.addEventListener("click",()=>{

if(usernameInput.value===correctUsername && passwordInput.value===correctPassword){

loginScreen.style.display="none";
bootScreen.style.display="block";

startBootSequence();

}else{

loginError.textContent="Incorrect username or password!";
document.getElementById("letterHint").style.display="inline";

}

});

/* UTIL */

function sleep(ms){
return new Promise(resolve=>setTimeout(resolve,ms));
}

async function typewriter(text,container,speed=20){

container.textContent="";

for(let i=0;i<text.length;i++){
container.textContent+=text[i];
await sleep(speed);
}

}

/* UUID */

function generateUUID(){

return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{

const r=Math.random()*16|0,v=c=='x'?r:(r&0x3|0x8);

return v.toString(16);

});

}

/* LOADING BAR */

async function loadBar(container,failAt=null){

const barContainer=document.createElement("div");
barContainer.className="bar-container";

const barFill=document.createElement("div");
barFill.className="bar-fill";

barContainer.appendChild(barFill);
container.appendChild(barContainer);

let progress=0;

while(progress<100){

const step=Math.floor(Math.random()*5)+1;

progress+=step;

if(failAt && progress>=failAt){

progress=failAt;

barFill.style.width=progress+"%";
barFill.classList.add("yellow");

break;

}

if(progress>100)progress=100;

barFill.style.width=progress+"%";

await sleep(Math.random()*80+20);

}

}

/* MODULE LOADING */

async function loadModule(name){

const module=document.createElement("div");
module.className="module";

output.appendChild(module);

const title=document.createElement("div");

module.appendChild(title);

await typewriter("Loading "+name+"...",title);

if(name==="Player.Memory"){

await loadBar(module,70);

const err=document.createElement("div");
err.className="text-yellow";

module.appendChild(err);

await typewriter("[!] Memory failure",err);

const skip=document.createElement("div");
skip.className="text-yellow";

module.appendChild(skip);

await typewriter("[!] Skipped memory",skip);

}

else if(name==="Player.Identity"){

await loadBar(module,50);

const err=document.createElement("div");
err.className="text-yellow";

module.appendChild(err);

await typewriter("[!] Missing memory",err);

const retry=document.createElement("div");

module.appendChild(retry);

await typewriter("Creating new memory...",retry);

await loadBar(module);

}

else{

await loadBar(module);

}

const done=document.createElement("div");

module.appendChild(done);

await typewriter("Complete",done);

}

/* PLAYER CREATION */

async function createPlayers(count=5){

const uuids=[];

for(let i=0;i<count;i++){

const uuid=generateUUID();

uuids.push(uuid);

const line=document.createElement("div");

output.appendChild(line);

await typewriter("> Creating Player",line);

const idLine=document.createElement("div");

output.appendChild(idLine);

await typewriter("Player-UUID: "+uuid,idLine);

await sleep(100);

}

return uuids;

}

/* PLAYER LIST */

async function showPlayers(uuids){

const title=document.createElement("h3");
title.textContent="Player List";

playerList.appendChild(title);

for(const uuid of uuids){

const entry=document.createElement("div");
entry.className="player-entry";

playerList.appendChild(entry);

await typewriter("Player-UUID: "+uuid,entry);

const status=document.createElement("div");

entry.appendChild(status);

await typewriter("Status: Alive | Contained | Conscious",status);

}

}

/* BOOT SEQUENCE */

async function startBootSequence(){

const header=document.createElement("div");

output.appendChild(header);

await typewriter("> Creating experiment",header);

const init=document.createElement("div");

output.appendChild(init);

await typewriter("Initializing player",init);

await sleep(400);

const modules=[

"Player.Brain",
"Player.Blood",
"Player.NervousSystem",
"Player.MotorFunctions",
"Player.Vision",
"Player.Audio",
"Player.Memory",
"Player.Emotion",
"Player.Logic",
"Player.Language",
"Player.Identity"

];

for(const mod of modules){

await loadModule(mod);

}

const uuids=await createPlayers(5);

await showPlayers(uuids);

const finish=document.createElement("div");

output.appendChild(finish);

await typewriter("Player initialization complete.",finish);

}

</script>

</body>
</html>
